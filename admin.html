<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harps Tech Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
body { background: #050505; color: #fff; font-family: 'Outfit', sans-serif; }
.card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; }
.btn { background: linear-gradient(90deg, #00E8FF, #0072FF); padding: 10px 20px; border-radius: 12px; font-weight: 600; color: #000; cursor: pointer; }
.btn-red { background: #ef4444; padding: 8px 16px; border-radius: 10px; font-weight: 600; color: #fff; cursor: pointer; }
.btn-green { background: #22c55e; padding: 8px 16px; border-radius: 10px; font-weight: 600; color: #fff; cursor: pointer; }
input, textarea, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; width: 100%; color: #fff; }
.tab-btn { padding: 10px 16px; border-radius: 10px; background: rgba(255,255,255,0.05); cursor: pointer; white-space: nowrap; }
.tab-btn.active { background: linear-gradient(90deg, #00E8FF, #0072FF); color: #000; font-weight: 600; }
</style>
</head>
<body class="p-4 md:p-6">

<div id="loginCheck" class="text-center mt-20">
  <h2 class="text-2xl font-bold mb-4">Checking access...</h2>
</div>

<div id="adminPanel" class="hidden max-w-7xl mx-auto">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl md:text-3xl font-bold">Harps Tech Admin</h1>
    <button onclick="logout()" class="btn-red">Logout</button>
  </div>
  
  <div class="flex gap-3 mb-6 overflow-x-auto pb-2">
    <button onclick="showTab('dashboard')" class="tab-btn active">Dashboard</button>
    <button onclick="showTab('users')" class="tab-btn">Users</button>
    <button onclick="showTab('orders')" class="tab-btn">Orders</button>
    <button onclick="showTab('topup')" class="tab-btn">Top-ups</button>
    <button onclick="showTab('invest')" class="tab-btn">Investments</button>
    <button onclick="showTab('refer')" class="tab-btn">Referrals</button>
    <button onclick="showTab('services')" class="tab-btn">Services</button>
    <button onclick="showTab('chat')" class="tab-btn">Chat</button>
    <button onclick="showTab('settings')" class="tab-btn">Settings</button>
  </div>

  <div id="tab-dashboard" class="tab">
    <div class="grid md:grid-cols-4 gap-4 mb-6">
      <div class="card"><p class="text-gray-400">Total Users</p><p id="statUsers" class="text-3xl font-bold">0</p></div>
      <div class="card"><p class="text-gray-400">Total Orders</p><p id="statOrders" class="text-3xl font-bold">0</p></div>
      <div class="card"><p class="text-gray-400">Revenue</p><p id="statRevenue" class="text-3xl font-bold">₦0</p></div>
      <div class="card"><p class="text-gray-400">Pending Top-ups</p><p id="statTopups" class="text-3xl font-bold">0</p></div>
    </div>
    <div class="card">
      <h3 class="font-bold mb-4">Recent Orders</h3>
      <div id="recentOrders" class="space-y-2"></div>
    </div>
  </div>

  <div id="tab-users" class="tab hidden">
    <input id="userSearch" placeholder="Search by email..." class="mb-4" oninput="filterUsers()">
    <div id="usersList" class="space-y-3"></div>
  </div>

  <div id="tab-orders" class="tab hidden">
    <div id="ordersList" class="space-y-3"></div>
  </div>

  <div id="tab-topup" class="tab hidden">
    <div class="card mb-4">
      <h3 class="font-bold mb-3">Manual Top-up</h3>
      <input id="manualEmail" placeholder="User email">
      <input id="manualAmount" type="number" placeholder="Amount" class="mt-2">
      <button onclick="manualTopup()" class="btn mt-3 w-full">Credit User</button>
    </div>
    <div id="topupList" class="space-y-4"></div>
  </div>

  <div id="tab-invest" class="tab hidden">
    <div id="investList" class="space-y-4"></div>
  </div>

  <div id="tab-refer" class="tab hidden">
    <div id="referList" class="space-y-4"></div>
  </div>

  <div id="tab-services" class="tab hidden">
    <div id="servicesList" class="space-y-4"></div>
  </div>

  <div id="tab-chat" class="tab hidden">
    <div id="chatUsers" class="grid md:grid-cols-2 gap-4"></div>
  </div>

  <div id="tab-settings" class="tab hidden">
    <div class="card mb-4">
      <h3 class="font-bold mb-3">Change Password</h3>
      <input type="password" id="newPassword" placeholder="New password">
      <button onclick="changePassword()" class="btn mt-3">Update Password</button>
      <div id="pwMsg" class="mt-3"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, addDoc, collection, query, where, orderBy, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const OWNER_EMAIL = "okugbepraise@gmail.com";

const firebaseConfig = {
  apiKey: "AIzaSyA5BIEikFvCT6rZ3bPC2Q4zjSBXkd_5BNQ",
  authDomain: "harps-tech-95856.firebaseapp.com",
  projectId: "harps-tech-95856",
  storageBucket: "harps-tech-95856.firebasestorage.app",
  messagingSenderId: "937702997468",
  appId: "1:937702997468:web:ca65a04fa1b026b5506319"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let allUsers = [];
let allOrders = [];

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html?redirect=admin.html";
    return;
  }
  
  currentUser = user;
  
  if (user.email.toLowerCase().trim() !== OWNER_EMAIL.toLowerCase().trim()) {
    document.getElementById('loginCheck').innerHTML = 
      `<h2 class='text-red-500'>Access Denied. Not owner.</h2>
       <p class='text-gray-400 mt-2'>Logged in as: ${user.email}</p>`;
    return;
  }
  
  document.getElementById('loginCheck').classList.add('hidden');
  document.getElementById('adminPanel').classList.remove('hidden');
  loadDashboard();
  loadUsers();
  loadOrders();
  loadTopups();
  loadInvestments();
  loadReferrals();
  loadServices();
  loadChats();
});

window.showTab = (tab) => {
  document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.remove('hidden');
  event.target.classList.add('active');
}

async function loadDashboard() {
  const usersSnap = await getDocs(collection(db, "users"));
  const ordersSnap = await getDocs(collection(db, "orders"));
  const topupsSnap = await getDocs(query(collection(db, "topup_requests"), where("status", "==", "pending")));
  
  allUsers = usersSnap.docs.map(d => ({id: d.id, ...d.data()}));
  allOrders = ordersSnap.docs.map(d => ({id: d.id, ...d.data()}));
  
  document.getElementById('statUsers').textContent = allUsers.length;
  document.getElementById('statOrders').textContent = allOrders.length;
  document.getElementById('statRevenue').textContent = `₦${allOrders.reduce((sum, o) => sum + (o.totalPrice || o.amount || 0), 0).toLocaleString()}`;
  document.getElementById('statTopups').textContent = topupsSnap.size;
  
  document.getElementById('recentOrders').innerHTML = allOrders.slice(0, 5).map(o => `
    <div class="flex justify-between text-sm">
      <span>${o.userEmail || o.email}</span>
      <span>₦${o.totalPrice || o.amount || 0} - ${o.status}</span>
    </div>
  `).join('') || '<p class="text-gray-400">No orders yet</p>';
}

function loadUsers() {
  document.getElementById('usersList').innerHTML = allUsers.map(u => `
    <div class="card">
      <div class="flex justify-between items-start">
        <div>
          <p class="font-bold">${u.email}</p>
          <p class="text-sm text-gray-400">Balance: ₦${u.balance || 0}</p>
          <p class="text-sm text-gray-400">Referral Code: ${u.referralCode || 'N/A'}</p>
          <p class="text-sm text-gray-400">Referred By: ${u.referredBy || 'None'}</p>
        </div>
        <button onclick="editBalance('${u.id}', ${u.balance || 0})" class="btn">Edit Balance</button>
      </div>
    </div>
  `).join('');
}

window.filterUsers = () => {
  const search = document.getElementById('userSearch').value.toLowerCase();
  const filtered = allUsers.filter(u => u.email.toLowerCase().includes(search));
  document.getElementById('usersList').innerHTML = filtered.map(u => `
    <div class="card">
      <div class="flex justify-between items-start">
        <div>
          <p class="font-bold">${u.email}</p>
          <p class="text-sm text-gray-400">Balance: ₦${u.balance || 0}</p>
        </div>
        <button onclick="editBalance('${u.id}', ${u.balance || 0})" class="btn">Edit Balance</button>
      </div>
    </div>
  `).join('');
}

window.editBalance = async (uid, current) => {
  const newBal = prompt(`Current balance: ₦${current}\nEnter new balance:`);
  if (newBal !== null && !isNaN(newBal)) {
    await updateDoc(doc(db, "users", uid), { balance: parseFloat(newBal) });
    alert("Balance updated!");
    location.reload();
  }
}

window.manualTopup = async () => {
  const email = document.getElementById('manualEmail').value.trim();
  const amount = parseFloat(document.getElementById('manualAmount').value);
  if (!email || isNaN(amount)) return alert("Enter valid email and amount");
  
  const userDoc = allUsers.find(u => u.email === email);
  if (!userDoc) return alert("User not found");
  
  const newBal = (userDoc.balance || 0) + amount;
  await updateDoc(doc(db, "users", userDoc.id), { balance: newBal });
  alert(`Credited ₦${amount} to ${email}`);
  document.getElementById('manualEmail').value = '';
  document.getElementById('manualAmount').value = '';
  location.reload();
}

function loadOrders() {
  const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snap) => {
    allOrders = snap.docs.map(d => ({id: d.id, ...d.data()}));
    document.getElementById('ordersList').innerHTML = allOrders.map(o => `
      <div class="card">
        <p class="font-bold">${o.serviceName || 'Service'}</p>
        <p class="text-sm">User: ${o.userEmail || o.email}</p>
        <p class="text-sm">Amount: ₦${o.totalPrice || o.amount || 0}</p>
        <p class="text-sm">Status: <span class="font-bold">${o.status}</span></p>
        <div class="flex gap-2 mt-3">
          <select id="status-${o.id}" class="flex-1">
            <option value="pending">Pending</option>
            <option value="processing">Processing</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>
          <button onclick="updateOrderStatus('${o.id}')" class="btn">Update</button>
        </div>
      </div>
    `).join('') || '<p class="text-gray-400">No orders yet</p>';
  });
}

window.updateOrderStatus = async (id) => {
  const status = document.getElementById(`status-${id}`).value;
  await updateDoc(doc(db, "orders", id), { status });
  alert("Order updated!");
}

function loadTopups() {
  const q = query(collection(db, "topup_requests"), where("status", "==", "pending"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snap) => {
    document.getElementById('topupList').innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      return `
        <div class="card">
          <p class="font-bold">${d.email}</p>
          <p>Amount: ₦${d.amount}</p>
          <p class="text-sm text-gray-400">${d.note || ''}</p>
          <div class="flex gap-2 mt-3">
            <button onclick="approveTopup('${doc.id}', '${d.uid}', ${d.amount})" class="btn-green">Approve</button>
            <button onclick="declineTopup('${doc.id}')" class="btn-red">Decline</button>
          </div>
        </div>
      `
    }).join('') || '<p class="text-gray-400">No pending top-ups</p>';
  });
}

window.approveTopup = async (reqId, uid, amount) => {
  const userRef = doc(db, "users", uid);
  const userSnap = await getDoc(userRef);
  const currentBalance = userSnap.data()?.balance || 0;
  
  await updateDoc(userRef, { balance: currentBalance + amount });
  await updateDoc(doc(db, "topup_requests", reqId), { status: "approved" });
  alert("Credited successfully!");
  location.reload();
}

window.declineTopup = async (reqId) => {
  await updateDoc(doc(db, "topup_requests", reqId), { status: "declined" });
  alert("Declined!");
  location.reload();
}

function loadInvestments() {
  const q = query(collection(db, "investments"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snap) => {
    document.getElementById('investList').innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      return `
        <div class="card">
          <p class="font-bold">${d.email}</p>
          <p>Plan: ${d.plan}</p>
          <p>Amount: ₦${d.amount}</p>
          <p>Profit: ₦${d.profit || 0}</p>
          <p>Status: <span class="font-bold">${d.status}</span></p>
          <div class="flex gap-2 mt-3">
            ${d.status === 'active' ? `<button onclick="payProfit('${doc.id}', '${d.uid}', ${d.profit})" class="btn-green">Pay Profit</button>` : ''}
          </div>
        </div>
      `
    }).join('') || '<p class="text-gray-400">No investments yet</p>';
  });
}

window.payProfit = async (invId, uid, profit) => {
  const userRef = doc(db, "users", uid);
  const userSnap = await getDoc(userRef);
  const currentBalance = userSnap.data()?.balance || 0;
  
  await updateDoc(userRef, { balance: currentBalance + profit });
  await updateDoc(doc(db, "investments", invId), { status: "completed", paidAt: new Date() });
  alert("Profit paid!");
  location.reload();
}

function loadReferrals() {
  const q = query(collection(db, "referrals"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snap) => {
    document.getElementById('referList').innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      return `
        <div class="card">
          <p class="font-bold">Referrer: ${d.referrerEmail}</p>
          <p>Referred: ${d.referredEmail}</p>
          <p>Bonus: ₦${d.bonus}</p>
          <p>Status: ${d.status}</p>
        </div>
      `
    }).join('') || '<p class="text-gray-400">No referrals yet</p>';
  });
}

async function loadServices() {
  const snap1 = await getDoc(doc(db, 'config', 'services_part1'));
  const snap2 = await getDoc(doc(db, 'config', 'services_part2'));
  const services = [...(snap1.data()?.list || []), ...(snap2.data()?.list || [])];
  
  document.getElementById('servicesList').innerHTML = services.map((s) => `
    <div class="card">
      <p class="font-bold">${s.name}</p>
      <p>Price: ₦${s.pricePerUnit}</p>
      <p>Category: ${s.category}</p>
      <p>Available: ${s.available ? 'Yes' : 'No'}</p>
    </div>
  `).join('') || '<p class="text-gray-400">No services found</p>';
}

function loadChats() {
  const q = query(collection(db, "chat_messages"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snap) => {
    const users = {};
    snap.forEach(doc => {
      const data = doc.data();
      if (!users[data.uid]) users[data.uid] = {email: data.email, messages: []};
      users[data.uid].messages.push(data);
    });
    
    document.getElementById('chatUsers').innerHTML = Object.keys(users).map(uid => `
      <div class="card">
        <p class="font-bold">${users[uid].email}</p>
        <div class="h-40 overflow-y-auto my-3 text-sm bg-black/20 p-2 rounded">
          ${users[uid].messages.slice(0,5).map(m => `<p><b>${m.sender}:</b> ${m.message}</p>`).join('')}
        </div>
        <input id="reply-${uid}" placeholder="Type reply">
        <button onclick="sendReply('${uid}', '${users[uid].email}')" class="btn mt-2 w-full">Send Reply</button>
      </div>
    `).join('') || '<p class="text-gray-400">No chats yet</p>';
  });
}

window.sendReply = async (uid, email) => {
  const msg = document.getElementById(`reply-${uid}`).value;
  if (!msg) return;
  await addDoc(collection(db, "chat_messages"), {
    uid, email, message: msg, sender: 'admin', timestamp: new Date(), read: true
  });
  document.getElementById(`reply-${uid}`).value = '';
}

window.changePassword = async () => {
  const newPass = document.getElementById('newPassword').value;
  if (newPass.length < 6) return alert("Min 6 characters");
  await updatePassword(currentUser, newPass);
  document.getElementById('pwMsg').textContent = "Password updated!";
  document.getElementById('pwMsg').className = "text-green-400";
}

window.logout = async () => {
  await signOut(auth);
  window.location.href = "login.html";
}
</script>
</body>
</html>
