
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harps Tech Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
body { background: #050505; color: #fff; font-family: 'Outfit', sans-serif; }
.card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; }
.btn { background: linear-gradient(90deg, #00E8FF, #0072FF); padding: 10px 20px; border-radius: 12px; font-weight: 600; color: #000; cursor: pointer; }
.btn-red { background: #ef4444; padding: 8px 16px; border-radius: 10px; font-weight: 600; color: #fff; cursor: pointer; }
.btn-green { background: #22c55e; padding: 8px 16px; border-radius: 10px; font-weight: 600; color: #fff; cursor: pointer; }
.btn-orange { background: #f59e0b; padding: 8px 16px; border-radius: 10px; font-weight: 600; color: #fff; cursor: pointer; }
input, textarea, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; width: 100%; color: #fff; }
.tab-btn { padding: 10px 16px; border-radius: 10px; background: rgba(255,255,255,0.05); cursor: pointer; white-space: nowrap; }
.tab-btn.active { background: linear-gradient(90deg, #00E8FF, #0072FF); color: #000; font-weight: 600; }
.countdown { font-family: monospace; font-size: 0.9rem; }
</style>
</head>
<body class="p-4 md:p-6">

<div id="loginCheck" class="text-center mt-20">
  <h2 class="text-2xl font-bold mb-4">Checking access...</h2>
</div>

<div id="adminPanel" class="hidden max-w-7xl mx-auto">
  <div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl md:text-3xl font-bold">Harps Tech Admin</h1>
    <button onclick="logout()" class="btn-red">Logout</button>
  </div>

  <div class="flex gap-3 mb-6 overflow-x-auto pb-2">
    <button onclick="showTab('dashboard')" class="tab-btn active">Dashboard</button>
    <button onclick="showTab('users')" class="tab-btn">Users</button>
    <button onclick="showTab('orders')" class="tab-btn">Orders</button>
    <button onclick="showTab('topup')" class="tab-btn">Top-ups</button>
    <button onclick="showTab('invest')" class="tab-btn">Investments</button>
    <button onclick="showTab('withdrawals')" class="tab-btn">Withdrawals</button>
    <button onclick="showTab('refer')" class="tab-btn">Referrals</button>
    <button onclick="showTab('services')" class="tab-btn">Services</button>
    <button onclick="showTab('chat')" class="tab-btn">Chat</button>
    <button onclick="showTab('settings')" class="tab-btn">Settings</button>
  </div>

  <!-- Dashboard Tab -->
  <div id="tab-dashboard" class="tab">
    <div class="grid md:grid-cols-4 gap-4 mb-6">
      <div class="card"><p class="text-gray-400">Total Users</p><p id="statUsers" class="text-3xl font-bold">0</p></div>
      <div class="card"><p class="text-gray-400">Total Orders</p><p id="statOrders" class="text-3xl font-bold">0</p></div>
      <div class="card"><p class="text-gray-400">Revenue</p><p id="statRevenue" class="text-3xl font-bold">₦0</p></div>
      <div class="card"><p class="text-gray-400">Pending Withdrawals</p><p id="statWithdrawals" class="text-3xl font-bold">0</p></div>
    </div>
    <div class="card">
      <h3 class="font-bold mb-4">Recent Orders</h3>
      <div id="recentOrders" class="space-y-2"></div>
    </div>
  </div>

  <!-- Users Tab -->
  <div id="tab-users" class="tab hidden">
    <input id="userSearch" placeholder="Search by email..." class="mb-4" oninput="filterUsers()">
    <div id="usersList" class="space-y-3"></div>
  </div>

  <!-- Orders Tab -->
  <div id="tab-orders" class="tab hidden">
    <div id="ordersList" class="space-y-3"></div>
  </div>

  <!-- Top-up Tab -->
  <div id="tab-topup" class="tab hidden">
    <div class="card mb-4">
      <h3 class="font-bold mb-3">Manual Top-up</h3>
      <input id="manualEmail" placeholder="User email">
      <input id="manualAmount" type="number" placeholder="Amount" class="mt-2">
      <button onclick="manualTopup()" class="btn mt-3 w-full">Credit User</button>
    </div>
    <div id="topupList" class="space-y-4"></div>
  </div>

  <!-- Investments Tab -->
  <div id="tab-invest" class="tab hidden">
    <div id="investList" class="space-y-4"></div>
  </div>

  <!-- Withdrawals Tab -->
  <div id="tab-withdrawals" class="tab hidden">
    <div id="withdrawList" class="space-y-4"></div>
  </div>

  <!-- Referrals Tab -->
  <div id="tab-refer" class="tab hidden">
    <div id="referList" class="space-y-4"></div>
  </div>

  <!-- Services Tab -->
  <div id="tab-services" class="tab hidden">
    <div id="servicesList" class="space-y-4"></div>
  </div>

  <!-- Chat Tab -->
  <div id="tab-chat" class="tab hidden">
    <div id="chatUsers" class="grid md:grid-cols-2 gap-4"></div>
  </div>

  <!-- Settings Tab -->
  <div id="tab-settings" class="tab hidden">
    <div class="card mb-4">
      <h3 class="font-bold mb-3">Change Password</h3>
      <input type="password" id="newPassword" placeholder="New password">
      <button onclick="changePassword()" class="btn mt-3">Update Password</button>
      <div id="pwMsg" class="mt-3"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, addDoc, collection, query, where, orderBy, onSnapshot, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const OWNER_EMAIL = "okugbepraise@gmail.com";

const firebaseConfig = {
  apiKey: "AIzaSyA5BIEikFvCT6rZ3bPC2Q4zjSBXkd_5BNQ",
  authDomain: "harps-tech-95856.firebaseapp.com",
  projectId: "harps-tech-95856",
  storageBucket: "harps-tech-95856.firebasestorage.app",
  messagingSenderId: "937702997468",
  appId: "1:937702997468:web:ca65a04fa1b026b5506319"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let allUsers = [];
let allOrders = [];

function getTimeRemaining(endTime) {
    const total = endTime - new Date();
    if (total <= 0) return { days: 0, hours: 0, minutes: 0, seconds: 0, expired: true };
    const days = Math.floor(total / (1000 * 60 * 60 * 24));
    const hours = Math.floor((total % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((total % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((total % (1000 * 60)) / 1000);
    return { days, hours, minutes, seconds, expired: false };
}

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html?redirect=admin.html";
    return;
  }

  currentUser = user;

  if (user.email.toLowerCase().trim()!== OWNER_EMAIL.toLowerCase().trim()) {
    document.getElementById('loginCheck').innerHTML =
      `<h2 class='text-red-500'>Access Denied. Not owner.</h2>
       <p class='text-gray-400 mt-2'>Logged in as: ${user.email}</p>`;
    return;
  }

  document.getElementById('loginCheck').classList.add('hidden');
  document.getElementById('adminPanel').classList.remove('hidden');
  loadDashboard();
  loadUsers();
  loadOrders();
  loadTopups();
  loadInvestments();
  loadWithdrawals();
  loadReferrals();
  loadServices();
  loadChats();
});

window.showTab = (tab) => {
  document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.remove('hidden');
  event.target.classList.add('active');
}

async function loadDashboard() {
  const usersSnap = await getDocs(collection(db, "users"));
  const ordersSnap = await getDocs(collection(db, "orders"));
  const topupsSnap = await getDocs(query(collection(db, "topup_requests"), where("status", "==", "pending")));
  const withdrawalsSnap = await getDocs(query(collection(db, "withdraw_requests"), where("status", "==", "pending")));

  allUsers = usersSnap.docs.map(d => ({id: d.id,...d.data()}));
  allOrders = ordersSnap.docs.map(d => ({id: d.id,...d.data()}));

  document.getElementById('statUsers').textContent = allUsers.length;
  document.getElementById('statOrders').textContent = allOrders.length;
  document.getElementById('statRevenue').textContent = `₦${allOrders.reduce((sum, o) => sum + (o.totalPrice || o.amount || 0), 0).toLocaleString()}`;
  document.getElementById('statWithdrawals').textContent = withdrawalsSnap.size;

  document.getElementById('recentOrders').innerHTML = allOrders.slice(0, 5).map(o => `
    <div class="flex justify-between text-sm">
      <span>${o.userEmail || o.email}</span>
      <span>₦${o.totalPrice || o.amount || 0} - ${o.status}</span>
    </div>
  `).join('') || '<p class="text-gray-400">No orders yet</p>';
}

function loadUsers() {
  document.getElementById('usersList').innerHTML = allUsers.map(u => `
    <div class="card">
      <div class="flex justify-between items-start">
        <div>
          <p class="font-bold">${u.email}</p>
          <p class="text-sm text-gray-400">Balance: ₦${(u.balance || 0).toLocaleString()}</p>
          <p class="text-sm text-gray-400">Referral Code: ${u.referralCode || 'N/A'}</p>
          <p class="text-sm text-gray-400">Referred By: ${u.referredBy || 'None'}</p>
        </div>
        <div class="flex gap-2">
          <button onclick="editBalance('${u.id}', ${u.balance || 0})" class="btn">Edit Balance</button>
          <button onclick="deleteItem('users', '${u.id}')" class="btn-red">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

window.filterUsers = () => {
  const search = document.getElementById('userSearch').value.toLowerCase();
  const filtered = allUsers.filter(u => u.email.toLowerCase().includes(search));
  document.getElementById('usersList').innerHTML = filtered.map(u => `
    <div class="card">
      <div class="flex justify-between items-start">
        <div>
          <p class="font-bold">${u.email}</p>
          <p class="text-sm text-gray-400">Balance: ₦${(u.balance || 0).toLocaleString()}</p>
        </div>
        <div class="flex gap-2">
          <button onclick="editBalance('${u.id}', ${u.balance || 0})" class="btn">Edit Balance</button>
          <button onclick="deleteItem('users', '${u.id}')" class="btn-red">Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

window.editBalance = async (uid, current) => {
  const newBal = prompt(`Current balance: ₦${current}\nEnter new balance:`);
  if (newBal!== null &&!isNaN(newBal)) {
    await updateDoc(doc(db, "users", uid), { balance: parseFloat(newBal) });
    alert("Balance updated!");
    location.reload();
  }
}

window.manualTopup = async () => {
  const email = document.getElementById('manualEmail').value.trim();
  const amount = parseFloat(document.getElementById('manualAmount').value);
  if (!email || isNaN(amount)) return alert("Enter valid email and amount");

  const userDoc = allUsers.find(u => u.email === email);
  if (!userDoc) return alert("User not found");

  const newBal = (userDoc.balance || 0) + amount;
  await updateDoc(doc(db, "users", userDoc.id), { balance: newBal });
  alert(`Credited ₦${amount} to ${email}`);
  document.getElementById('manualEmail').value = '';
  document.getElementById('manualAmount').value = '';
  location.reload();
}

function loadOrders() {
  const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snap) => {
    allOrders = snap.docs.map(d => ({id: d.id,...d.data()}));
    document.getElementById('ordersList').innerHTML = allOrders.map(o => `
      <div class="card">
        <div class="flex justify-between items-start mb-3">
          <div>
            <p class="font-bold">${o.serviceName || 'Service'}</p>
            <p class="text-sm">User: ${o.userEmail || o.email}</p>
            <p class="text-sm">Amount: ₦${(o.totalPrice || o.amount || 0).toLocaleString()}</p>
            <p class="text-sm">Status: <span class="font-bold">${o.status}</span></p>
          </div>
          <button onclick="deleteItem('orders', '${o.id}')" class="btn-red">Delete</button>
        </div>

        <div class="bg-black/30 p-3 rounded-xl space-y-1 text-sm">
          <p><span class="text-gray-400">Order ID:</span> ${o.id}</p>
          <p><span class="text-gray-400">Service ID:</span> ${o.serviceId || 'N/A'}</p>
          <p><span class="text-gray-400">Link/URL:</span> ${o.link || 'N/A'}</p>
          <p><span class="text-gray-400">Quantity:</span> ${o.quantity || 1}</p>
          <p><span class="text-gray-400">Date:</span> ${o.createdAt?.toDate? o.createdAt.toDate().toLocaleString() : 'N/A'}</p>
        </div>

        <div class="flex gap-2 mt-3">
          <select id="status-${o.id}" class="flex-1">
            <option value="pending" ${o.status==='pending'?'selected':''}>Pending</option>
            <option value="processing" ${o.status==='processing'?'selected':''}>Processing</option>
            <option value="completed" ${o.status==='completed'?'selected':''}>Completed</option>
            <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option>
          </select>
          <button onclick="updateOrderStatus('${o.id}')" class="btn">Update</button>
        </div>
      </div>
    `).join('') || '<p class="text-gray-400">No orders yet</p>';
  });
}

window.updateOrderStatus = async (id) => {
  const status = document.getElementById(`status-${id}`).value;
  await updateDoc(doc(db, "orders", id), { status });
  alert("Order updated!");
}

function loadTopups() {
  const q = query(collection(db, "topup_requests"), where("status", "==", "pending"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snap) => {
    if (snap.empty) {
      document.getElementById('topupList').innerHTML = '<p class="text-gray-400">No pending top-ups</p>';
      return;
    }
    document.getElementById('topupList').innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      const date = d.createdAt?.toDate? d.createdAt.toDate().toLocaleString() : 'N/A';
      return `
        <div class="card">
          <div class="flex justify-between items-start mb-2">
            <div>
              <p class="font-bold">${d.email}</p>
              <p>Amount: ₦${d.amount.toLocaleString()}</p>
              <p class="text-sm text-gray-400">${d.note || 'No note'}</p>
              <p class="text-xs text-gray-500">${date}</p>
            </div>
            <button onclick="deleteItem('topup_requests', '${doc.id}')" class="btn-red">Delete</button>
          </div>
          <div class="flex gap-2 mt-3">
            <button onclick="approveTopup('${doc.id}', '${d.uid}', ${d.amount})" class="btn-green">Approve</button>
            <button onclick="declineTopup('${doc.id}')" class="btn-red">Decline</button>
          </div>
        </div>
      `
    }).join('');
  });
}

window.approveTopup = async (reqId, uid, amount) => {
  const userRef = doc(db, "users", uid);
  const userSnap = await getDoc(userRef);
  const currentBalance = userSnap.data()?.balance || 0;

  await updateDoc(userRef, { balance: currentBalance + amount });
  await updateDoc(doc(db, "topup_requests", reqId), {
    status: "approved", approvedAt: new Date()
  });
  alert(`Credited ₦${amount} successfully!`);
  location.reload();
}

window.declineTopup = async (reqId) => {
  await updateDoc(doc(db, "topup_requests", reqId), {
    status: "declined", declinedAt: new Date()
  });
  alert("Declined!");
  location.reload();
}

function loadInvestments() {
  const q = query(collection(db, "investments"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snap) => {
    document.getElementById('investList').innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      const startDate = d.timestamp?.toDate? d.timestamp.toDate() : new Date(d.timestamp);
      const planDays = d.plan.includes('7days')? 7 : d.plan.includes('14days')? 14 : 30;
      const endDate = new Date(startDate.getTime() + planDays * 24 * 60 * 60 * 1000);
      const timeLeft = getTimeRemaining(endDate);

      let statusColor = 'text-yellow-400';
      if (d.status === 'completed') statusColor = 'text-green-400';
      if (d.status === 'withdrawal_pending') statusColor = 'text-orange-400';
      if (timeLeft.expired && d.status === 'active') statusColor = 'text-red-400';

      return `
        <div class="card" id="inv-${doc.id}">
          <div class="flex justify-between items-start mb-2">
            <div>
              <p class="font-bold">${d.email}</p>
              <span class="text-xs px-2 py-1 rounded ${statusColor} bg-white/5">${d.status}</span>
            </div>
            <button onclick="deleteItem('investments', '${doc.id}')" class="btn-red">Delete</button>
          </div>
          <p>Plan: ${d.plan} (${planDays} days)</p>
          <p>Amount: ₦${d.amount.toLocaleString()}</p>
          <p>Profit: ₦${d.profit.toLocaleString()}</p>
          <p>Total Payout: ₦${(d.amount + d.profit).toLocaleString()}</p>
          <p class="text-sm text-gray-400">Started: ${startDate.toLocaleString()}</p>
          <p class="countdown font-bold ${timeLeft.expired? 'text-red-400' : 'text-cyan-400'}"
             data-end="${endDate.getTime()}">
            ${timeLeft.expired? 'Matured' : `Time Left: ${timeLeft.days}d ${timeLeft.hours}h ${timeLeft.minutes}m ${timeLeft.seconds}s`}
          </p>

          <div class="flex gap-2 mt-3 flex-wrap">
            ${d.status === 'active' && timeLeft.expired?
              `<button onclick="payProfit('${doc.id}', '${d.uid}', ${d.profit}, ${d.amount})" class="btn-green">Pay Profit + Principal</button>` : ''}

            ${d.status === 'withdrawal_pending'?
              `<button onclick="approveWithdrawal('${doc.id}', '${d.uid}', ${d.amount + d.profit})" class="btn-green">Approve Withdrawal</button>
               <button onclick="rejectWithdrawal('${doc.id}')" class="btn-red">Reject</button>` : ''}
          </div>
        </div>
      `
    }).join('') || '<p class="text-gray-400">No investments yet</p>';
  });
}

function loadWithdrawals() {
  const q = query(collection(db, "withdraw_requests"), orderBy("requestedAt", "desc"));
  onSnapshot(q, (snap) => {
    document.getElementById('withdrawList').innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      const date = d.requestedAt?.toDate? d.requestedAt.toDate().toLocaleString() : 'N/A';
      const bank = d.bankDetails || {};

      return `
        <div class="card">
          <div class="flex justify-between items-start mb-3">
            <div>
              <p class="font-bold">${d.email}</p>
              <p class="text-sm text-gray-400">Amount: ₦${d.amount.toLocaleString()}</p>
              <p class="text-sm">Principal: ₦${d.principal.toLocaleString()} | Profit: ₦${d.profit.toLocaleString()}</p>
            </div>
            <div class="flex flex-col items-end gap-2">
              <span class="text-xs px-2 py-1 rounded ${d.status === 'pending'? 'bg-yellow-500/20 text-yellow-400' : d.status === 'approved'? 'bg-green-500/20 text-green-400' : 'bg-red-500/20 text-red-400'}">${d.status}</span>
              <button onclick="deleteItem('withdraw_requests', '${doc.id}')" class="btn-red">Delete</button>
            </div>
          </div>

          <div class="bg-black/30 p-3 rounded-xl mb-3">
            <p class="text-xs text-gray-500 uppercase mb-1">Bank Details</p>
            <p class="text-sm"><span class="text-gray-400">Bank:</span> ${bank.bankName || 'N/A'}</p>
            <p class="text-sm"><span class="text-gray-400">Account Name:</span> ${bank.accountName || 'N/A'}</p>
            <p class="text-sm"><span class="text-gray-400">Account No:</span> ${bank.accountNumber || 'N/A'}</p>
          </div>

          <p class="text-xs text-gray-500">Requested: ${date}</p>

          ${d.status === 'pending'? `
          <div class="flex gap-2 mt-3">
            <button onclick="approveWithdrawal('${d.investmentId}', '${d.uid}', ${d.amount})" class="btn-green">Approve & Mark Paid</button>
            <button onclick="rejectWithdrawal('${d.investmentId}')" class="btn-red">Reject</button>
          </div>` : ''}
        </div>
      `
    }).join('') || '<p class="text-gray-400">No withdrawal requests yet</p>';
  });
}

window.payProfit = async (invId, uid, profit, principal) => {
    const userRef = doc(db, "users", uid);
    const userSnap = await getDoc(userRef);
    const currentBalance = userSnap.data()?.balance || 0;

    await updateDoc(userRef, { balance: currentBalance + profit + principal });
    await updateDoc(doc(db, "investments", invId), {
        status: "completed", paidAt: new Date()
    });
    alert(`Paid ₦${profit + principal} to user!`);
}

window.approveWithdrawal = async (invId, uid, amount) => {
    const userRef = doc(db, "users", uid);
    const userSnap = await getDoc(userRef);
    const currentBalance = userSnap.data()?.balance || 0;

    await updateDoc(userRef, { balance: currentBalance + amount });
    await updateDoc(doc(db, "investments", invId), {
        status: "withdrawn", withdrawnAt: new Date()
    });

    const wrQuery = query(collection(db, "withdraw_requests"), where("investmentId", "==", invId));
    const wrSnap = await getDocs(wrQuery);
    if (!wrSnap.empty) {
        await updateDoc(doc(db, "withdraw_requests", wrSnap.docs[0].id), {
            status: "approved", approvedAt: new Date()
        });
    }

    alert(`Withdrawal of ₦${amount} approved and paid!`);
}

window.rejectWithdrawal = async (invId) => {
    await updateDoc(doc(db, "investments", invId), { status: "active" });

    const wrQuery = query(collection(db, "withdraw_requests"), where("investmentId", "==", invId));
    const wrSnap = await getDocs(wrQuery);
    if (!wrSnap.empty) {
        await updateDoc(doc(db, "withdraw_requests", wrSnap.docs[0].id), {
            status: "rejected", rejectedAt: new Date()
        });
    }
    alert("Withdrawal rejected. Investment is active again.");
}

function loadReferrals() {
  const q = query(collection(db, "referrals"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snap) => {
    document.getElementById('referList').innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      return `
        <div class="card">
          <div class="flex justify-between items-start">
            <div>
              <p class="font-bold">Referrer: ${d.referrerEmail}</p>
              <p>Referred: ${d.referredEmail}</p>
              <p>Bonus: ₦${d.bonus}</p>
              <p>Status: ${d.status}</p>
            </div>
            <button onclick="deleteItem('referrals', '${doc.id}')" class="btn-red">Delete</button>
          </div>
        </div>
      `
    }).join('') || '<p class="text-gray-400">No referrals yet</p>';
  });
}

async function loadServices() {
  const snap1 = await getDoc(doc(db, 'config', 'services_part1'));
  const snap2 = await getDoc(doc(db, 'config', 'services_part2'));
  const services = [...(snap1.data()?.list || []),...(snap2.data()?.list || [])];

  document.getElementById('servicesList').innerHTML = services.map((s, idx) => `
    <div class="card">
      <div class="flex justify-between items-start">
        <div>
          <p class="font-bold">${s.name}</p>
          <p>Price: ₦${s.pricePerUnit}</p>
          <p>Category: ${s.category}</p>
          <p>Available: ${s.available? 'Yes' : 'No'}</p>
        </div>
        <button onclick="deleteService(${idx})" class="btn-red">Delete</button>
      </div>
    </div>
  `).join('') || '<p class="text-gray-400">No services found</p>';
}

window.deleteService = async (index) => {
  if (!confirm("Delete this service?")) return;
  const snap1 = await getDoc(doc(db, 'config', 'services_part1'));
  const snap2 = await getDoc(doc(db, 'config', 'services_part2'));
  let list1 = snap1.data()?.list || [];
  let list2 = snap2.data()?.list || [];
  let all = [...list1,...list2];

  all.splice(index, 1);

  const mid = Math.ceil(all.length / 2);
  await updateDoc(doc(db, 'config', 'services_part1'), { list: all.slice(0, mid) });
  await updateDoc(doc(db, 'config', 'services_part2'), { list: all.slice(mid) });
  alert("Service deleted!");
  location.reload();
}

function loadChats() {
  const q = query(collection(db, "chat_messages"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snap) => {
    const users = {};
    snap.forEach(doc => {
      const data = doc.data();
      if (!users[data.uid]) users[data.uid] = {email: data.email, messages: []};
      users[data.uid].messages.push({id: doc.id,...data});
    });

    document.getElementById('chatUsers').innerHTML = Object.keys(users).map(uid => `
      <div class="card">
        <div class="flex justify-between items-center mb-3">
          <p class="font-bold">${users[uid].email}</p>
          <button onclick="deleteUserChat('${uid}')" class="btn-red text-xs">Delete Chat</button>
        </div>
        <div class="h-40 overflow-y-auto my-3 text-sm bg-black/20 p-2 rounded space-y-2">
          ${users[uid].messages.slice(0,10).map(m => `
            <div class="flex justify-between items-start">
              <p><b>${m.sender}:</b> ${m.message}</p>
              <button onclick="deleteItem('chat_messages', '${m.id}')" class="text-red-400 text-xs">x</button>
            </div>
          `).join('')}
        </div>
        <input id="reply-${uid}" placeholder="Type reply">
        <button onclick="sendReply('${uid}', '${users[uid].email}')" class="btn mt-2 w-full">Send Reply</button>
      </div>
    `).join('') || '<p class="text-gray-400">No chats yet</p>';
  });
}

window.sendReply = async (uid, email) => {
  const msg = document.getElementById(`reply-${uid}`).value;
  if (!msg) return;

  const userQuery = query(collection(db, "users"), where("email", "==", email));
  const userSnap = await getDocs(userQuery);

  if (userSnap.empty) {
    alert("User not found");
    return;
  }

  const correctUid = userSnap.docs[0].id;

  await addDoc(collection(db, "chat_messages"), {
    uid: correctUid,
    email: email,
    message: msg,
    sender: 'admin',
    timestamp: new Date(),
    read: false
  });
  document.getElementById(`reply-${uid}`).value = '';
  alert("Reply sent!");
}

window.deleteUserChat = async (uid) => {
  if (!confirm("Delete all chat messages for this user?")) return;
  const q = query(collection(db, "chat_messages"), where("uid", "==", uid));
  const snap = await getDocs(q);
  for (const doc of snap.docs) {
    await deleteDoc(doc.ref);
  }
  alert("Chat deleted!");
}

window.deleteItem = async (collectionName, id) => {
  if (!confirm(`Delete this ${collectionName} item? This cannot be undone.`)) return;
  await deleteDoc(doc(db, collectionName, id));
  alert("Deleted!");
}

window.changePassword = async () => {
  const newPass = document.getElementById('newPassword').value;
  if (newPass.length < 6) return alert("Min 6 characters");
  await updatePassword(currentUser, newPass);
  document.getElementById('pwMsg').textContent = "Password updated!";
  document.getElementById('pwMsg').className = "text-green-400";
}

window.logout = async () => {
  await signOut(auth);
  window.location.href = "login.html";
}

// Update countdowns every second
setInterval(() => {
  document.querySelectorAll('.countdown[data-end]').forEach(el => {
    const endTime = parseInt(el.dataset.end);
    const timeLeft = getTimeRemaining(new Date(endTime));
    if (timeLeft.expired) {
      el.textContent = 'Matured';
      el.className = 'countdown font-bold text-red-400';
    } else {
      el.textContent = `Time Left: ${timeLeft.days}d ${timeLeft.hours}h ${timeLeft.minutes}m ${timeLeft.seconds}s`;
    }
  });
}, 1000);
</script>
