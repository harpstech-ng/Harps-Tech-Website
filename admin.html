
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harps Tech Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
body { background: #050505; color: #fff; font-family: 'Outfit', sans-serif; }
.card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; }
.btn { background: linear-gradient(90deg, #00E8FF, #0072FF); padding: 10px 20px; border-radius: 12px; font-weight: 600; color: #000; }
input, textarea, select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; width: 100%; color: #fff; }
</style>
</head>
<body class="p-6">

<div id="loginCheck" class="text-center mt-20">
  <h2 class="text-2xl font-bold mb-4">Checking access...</h2>
</div>

<div id="adminPanel" class="hidden max-w-6xl mx-auto">
  <h1 class="text-3xl font-bold mb-6">Harps Tech Admin Panel</h1>
  
  <!-- Tabs -->
  <div class="flex gap-4 mb-6 overflow-x-auto">
    <button onclick="showTab('chat')" class="btn">Chat</button>
    <button onclick="showTab('topup')" class="btn">Top-ups</button>
    <button onclick="showTab('services')" class="btn">Services</button>
    <button onclick="showTab('settings')" class="btn">Settings</button>
    <button onclick="logout()" class="bg-red-600 px-4 py-2 rounded-xl">Logout</button>
  </div>

  <!-- Chat Tab -->
  <div id="tab-chat" class="tab">
    <h2 class="text-xl font-bold mb-4">User Chats</h2>
    <div id="chatUsers" class="grid md:grid-cols-3 gap-4"></div>
  </div>

  <!-- Top-up Tab -->
  <div id="tab-topup" class="tab hidden">
    <h2 class="text-xl font-bold mb-4">Pending Top-up Requests</h2>
    <div id="topupList" class="space-y-4"></div>
  </div>

  <!-- Services Tab -->
  <div id="tab-services" class="tab hidden">
    <h2 class="text-xl font-bold mb-4">Manage Services</h2>
    <div id="servicesList" class="space-y-4"></div>
  </div>

  <!-- Settings Tab -->
  <div id="tab-settings" class="tab hidden">
    <h2 class="text-xl font-bold mb-4">Change Password</h2>
    <input type="password" id="newPassword" placeholder="New password">
    <button onclick="changePassword()" class="btn mt-3">Update Password</button>
    <div id="pwMsg" class="mt-3"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, collection, query, where, orderBy, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const OWNER_EMAIL = "okugbepraise@gmail.com"; // CHANGE THIS

const firebaseConfig = {
  apiKey: "AIzaSyA5BIEikFvCT6rZ3bPC2Q4zjSBXkd_5BNQ",
  authDomain: "harps-tech-95856.firebaseapp.com",
  projectId: "harps-tech-95856",
  storageBucket: "harps-tech-95856.firebasestorage.app",
  messagingSenderId: "937702997468",
  appId: "1:937702997468:web:ca65a04fa1b026b5506319"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;

// Auth check
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  currentUser = user;
  
  if (user.email !== OWNER_EMAIL) {
    document.getElementById('loginCheck').innerHTML = "<h2 class='text-red-500'>Access Denied. Not owner.</h2>";
    return;
  }
  
  document.getElementById('loginCheck').classList.add('hidden');
  document.getElementById('adminPanel').classList.remove('hidden');
  loadChats();
  loadTopups();
  loadServices();
});

window.showTab = (tab) => {
  document.querySelectorAll('.tab').forEach(t => t.classList.add('hidden'));
  document.getElementById(`tab-${tab}`).classList.remove('hidden');
}

// 1. Chat
function loadChats() {
  const q = query(collection(db, "chat_messages"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snap) => {
    const users = {};
    snap.forEach(doc => {
      const data = doc.data();
      if (!users[data.uid]) users[data.uid] = {email: data.email, messages: []};
      users[data.uid].messages.push(data);
    });
    
    document.getElementById('chatUsers').innerHTML = Object.keys(users).map(uid => `
      <div class="card">
        <p class="font-bold">${users[uid].email}</p>
        <div class="h-40 overflow-y-auto my-3 text-sm">
          ${users[uid].messages.slice(0,5).map(m => `<p><b>${m.sender}:</b> ${m.message}</p>`).join('')}
        </div>
        <input id="reply-${uid}" placeholder="Type reply">
        <button onclick="sendReply('${uid}', '${users[uid].email}')" class="btn mt-2 w-full">Reply</button>
      </div>
    `).join('');
  });
}

window.sendReply = async (uid, email) => {
  const msg = document.getElementById(`reply-${uid}`).value;
  if (!msg) return;
  await addDoc(collection(db, "chat_messages"), {
    uid, email, message: msg, sender: 'admin', timestamp: new Date(), read: true
  });
  document.getElementById(`reply-${uid}`).value = '';
}

// 2. Top-ups
function loadTopups() {
  const q = query(collection(db, "topup_requests"), where("status", "==", "pending"));
  onSnapshot(q, (snap) => {
    document.getElementById('topupList').innerHTML = snap.docs.map(doc => {
      const d = doc.data();
      return `
        <div class="card">
          <p><b>${d.email}</b></p>
          <p>Amount: ₦${d.amount}</p>
          <p>Note: ${d.note}</p>
          <button onclick="approveTopup('${doc.id}', '${d.uid}', ${d.amount})" class="btn mt-2">Approve & Credit</button>
        </div>
      `
    }).join('');
  });
}

window.approveTopup = async (reqId, uid, amount) => {
  const userRef = doc(db, "users", uid);
  const userSnap = await getDoc(userRef);
  const currentBalance = userSnap.data()?.balance || 0;
  
  await updateDoc(userRef, { balance: currentBalance + amount });
  await updateDoc(doc(db, "topup_requests", reqId), { status: "approved" });
  alert("Credited successfully!");
}

// 3. Services
async function loadServices() {
  const snap1 = await getDoc(doc(db, 'config', 'services_part1'));
  const snap2 = await getDoc(doc(db, 'config', 'services_part2'));
  const services = [...(snap1.data()?.list || []), ...(snap2.data()?.list || [])];
  
  document.getElementById('servicesList').innerHTML = services.map(s => `
    <div class="card">
      <p class="font-bold">${s.name}</p>
      <p>Price: ₦${s.pricePerUnit}</p>
      <p>Category: ${s.category}</p>
    </div>
  `).join('');
}

// 4. Password
window.changePassword = async () => {
  const newPass = document.getElementById('newPassword').value;
  if (newPass.length < 6) return alert("Min 6 characters");
  await updatePassword(currentUser, newPass);
  document.getElementById('pwMsg').textContent = "Password updated!";
  document.getElementById('pwMsg').className = "text-green-400";
}

window.logout = async () => {
  await signOut(auth);
  window.location.href = "login.html";
}
</script>
</body>
</html>
