<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Harps Tech</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a192f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo {
      color: #facc15;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .tagline {
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 30px;
      font-weight: 700;
    }
    .input-group {
      position: relative;
      margin-bottom: 16px;
    }
    input {
      width: 100%;
      padding: 16px 48px 16px 16px;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #1e293b;
      color: #fff;
      font-size: 16px;
    }
    input::placeholder { color: #64748b; }
    input:focus { outline: none; border-color: #facc15; }
    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      padding: 4px;
    }
    .eye-btn:hover { color: #facc15; }
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: #facc15;
      color: #0a192f;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
    .forgot {
      text-align: right;
      margin: -10px 0 15px 0;
    }
    .forgot a {
      color: #94a3b8;
      font-size: 14px;
      text-decoration: none;
      cursor: pointer;
    }
    .forgot a:hover { color: #facc15; }
    .link {
      margin-top: 25px;
      color: #cbd5e1;
      font-size: 14px;
    }
    .link a {
      color: #facc15;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    .msg {
      font-size: 14px;
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 8px;
      display: none;
      text-align: left;
      word-break: break-word;
    }
    .msg.error { 
      color: #fecaca; 
      background: #7f1d1d; 
      display: block; 
      border: 1px solid #f87171;
    }
    .msg.success { 
      color: #bbf7d0; 
      background: #14532d; 
      display: block; 
      border: 1px solid #4ade80;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">HARPS TECH</div>
    <div class="tagline">The Future of Reliable Technology</div>
    
    <h1 id="formTitle">Create Account</h1>
    
    <div id="msg" class="msg"></div>
    
    <form id="authForm">
      <input type="text" id="fullname" placeholder="Full Name">
      
      <input type="email" id="email" placeholder="Email Address" required>
      
      <div class="input-group">
        <input type="password" id="password" placeholder="Password" required minlength="6">
        <button type="button" class="eye-btn" id="togglePassword">
          <i data-lucide="eye" id="eyeIcon"></i>
        </button>
      </div>
      
      <div class="forgot"><a id="forgotLink">Forgot Password?</a></div>
      <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
    </form>
    
    <div class="link">
      <span id="toggleText">Already have an account?</span> <a id="toggleLink">Login</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword,
      updateProfile,
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA5BIEikFvCT6rZ3bPC2Q4zjSBXkd_5BNQ",
      authDomain: "harps-tech-95856.firebaseapp.com",
      projectId: "harps-tech-95856",
      storageBucket: "harps-tech-95856.firebasestorage.app",
      messagingSenderId: "937702997468",
      appId: "1:937702997468:web:ca65a04fa1b026b5506319",
      measurementId: "G-P7HRDDTXMH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let isLogin = false;
    const form = document.getElementById('authForm');
    const submitBtn = document.getElementById('submitBtn');
    const toggleLink = document.getElementById('toggleLink');
    const fullnameInput = document.getElementById('fullname');
    const passwordInput = document.getElementById('password');
    const formTitle = document.getElementById('formTitle');
    const toggleText = document.getElementById('toggleText');
    const msg = document.getElementById('msg');
    const forgotLink = document.getElementById('forgotLink');
    const togglePassword = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');

    // Init lucide icons
    lucide.createIcons();

    function setMode(loginMode) {
      isLogin = loginMode;
      formTitle.textContent = isLogin ? 'Login' : 'Create Account';
      submitBtn.textContent = isLogin ? 'Login' : 'Create Account';
      toggleText.textContent = isLogin ? "Don't have an account?" : "Already have an account?";
      toggleLink.textContent = isLogin ? 'Create Account' : 'Login';
      
      if (isLogin) {
        fullnameInput.style.display = 'none';
        fullnameInput.removeAttribute('required');
        forgotLink.style.display = 'block';
      } else {
        fullnameInput.style.display = 'block';
        fullnameInput.setAttribute('required', '');
        forgotLink.style.display = 'none';
      }
      
      msg.textContent = '';
      msg.className = 'msg';
    }

    setMode(false);

    // Toggle Login/Signup
    toggleLink.addEventListener('click', (e) => {
      e.preventDefault();
      setMode(!isLogin);
    });

    // Toggle Password Visibility
    togglePassword.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.setAttribute('data-lucide', isPassword ? 'eye-off' : 'eye');
      lucide.createIcons();
    });

    // Forgot Password
    forgotLink.addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      if (!email) {
        msg.textContent = 'Enter your email first';
        msg.className = 'msg error';
        return;
      }
      try {
        await sendPasswordResetEmail(auth, email);
        msg.textContent = 'Password reset email sent. Check your inbox.';
        msg.className = 'msg success';
      } catch (error) {
        msg.textContent = error.message;
        msg.className = 'msg error';
      }
    });

    // Form Submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';
      msg.className = 'msg';
      
      const email = document.getElementById('email').value;
      const password = passwordInput.value;
      const fullname = fullnameInput.value;

      submitBtn.textContent = "Loading...";
      submitBtn.disabled = true;

      try {
        if (isLogin) {
          await signInWithEmailAndPassword(auth, email, password);
        } else {
          const userCred = await createUserWithEmailAndPassword(auth, email, password);
          await updateProfile(userCred.user, { displayName: fullname });
        }
        window.location.href = "dashboard.html";
      } catch (error) {
        // Clean up Firebase error message
        let errorMsg = error.message;
        if (error.code === 'auth/invalid-credential') {
          errorMsg = 'Invalid email or password';
        } else if (error.code === 'auth/user-not-found') {
          errorMsg = 'No account found with this email';
        } else if (error.code === 'auth/wrong-password') {
          errorMsg = 'Wrong password';
        } else if (error.code === 'auth/email-already-in-use') {
          errorMsg = 'This email is already registered';
        } else if (error.code === 'auth/weak-password') {
          errorMsg = 'Password should be at least 6 characters';
        }
        
        msg.textContent = errorMsg;
        msg.className = 'msg error';
      } finally {
        submitBtn.textContent = isLogin ? 'Login' : 'Create Account';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
