<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Harps Tech</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a192f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .logo {
      color: #facc15;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .tagline {
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 30px;
      font-weight: 700;
    }
    input {
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #1e293b;
      color: #fff;
      font-size: 16px;
    }
    input::placeholder {
      color: #64748b;
    }
    input:focus {
      outline: none;
      border-color: #facc15;
    }
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: #facc15;
      color: #0a192f;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn-primary:hover {
      background: #eab308;
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
      color: #64748b;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #334155;
    }
    .divider span {
      padding: 0 15px;
    }
    .btn-google {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid #334155;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .link {
      margin-top: 25px;
      color: #cbd5e1;
      font-size: 14px;
    }
    .link a {
      color: #facc15;
      text-decoration: none;
      font-weight: 600;
      cursor: pointer;
    }
    .error {
      color: #f87171;
      font-size: 14px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">HARPS TECH</div>
    <div class="tagline">The Future of Reliable Technology</div>
    
    <h1 id="formTitle">Create Account</h1>
    
    <div id="errorMsg" class="error"></div>
    
    <form id="authForm">
      <input type="text" id="fullname" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email Address" required>
      <input type="password" id="password" placeholder="Password" required minlength="6">
      <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
    </form>
    
    <div class="divider"><span>or continue with</span></div>
    
    <button class="btn-google" id="googleBtn">
      <svg width="20" height="20" viewBox="0 0 48 48">
        <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
        <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
        <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
        <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
      </svg>
      Continue with Google
    </button>
    
    <div class="link">
      <span id="toggleText">Already have an account?</span> <a id="toggleLink">Login</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { 
      getAuth, 
      createUserWithEmailAndPassword, 
      signInWithEmailAndPassword,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    // Your Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyA5BIEikFvCT6rZ3bPC2Q4zjSBXkd_5BNQ",
      authDomain: "harps-tech-95856.firebaseapp.com",
      projectId: "harps-tech-95856",
      storageBucket: "harps-tech-95856.firebasestorage.app",
      messagingSenderId: "937702997468",
      appId: "1:937702997468:web:ca65a04fa1b026b5506319",
      measurementId: "G-P7HRDDTXMH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let isLogin = false;
    const form = document.getElementById('authForm');
    const submitBtn = document.getElementById('submitBtn');
    const toggleLink = document.getElementById('toggleLink');
    const fullnameInput = document.getElementById('fullname');
    const formTitle = document.getElementById('formTitle');
    const toggleText = document.getElementById('toggleText');
    const errorMsg = document.getElementById('errorMsg');

    // Toggle between Login and Signup
    toggleLink.addEventListener('click', (e) => {
      e.preventDefault();
      isLogin = !isLogin;
      formTitle.textContent = isLogin ? 'Login' : 'Create Account';
      submitBtn.textContent = isLogin ? 'Login' : 'Create Account';
      fullnameInput.style.display = isLogin ? 'none' : 'block';
      toggleText.textContent = isLogin ? "Don't have an account?" : "Already have an account?";
      toggleLink.textContent = isLogin ? 'Create Account' : 'Login';
      errorMsg.textContent = '';
    });

    // Handle form submit
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.textContent = '';
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const fullname = document.getElementById('fullname').value;

      submitBtn.textContent = "Loading...";
      submitBtn.disabled = true;

      try {
        if (isLogin) {
          await signInWithEmailAndPassword(auth, email, password);
          alert("Login successful!");
        } else {
          const userCred = await createUserWithEmailAndPassword(auth, email, password);
          await updateProfile(userCred.user, { displayName: fullname });
          alert("Account created successfully!");
        }
        window.location.href = "dashboard.html";
      } catch (error) {
        errorMsg.textContent = error.message;
      } finally {
        submitBtn.textContent = isLogin ? 'Login' : 'Create Account';
        submitBtn.disabled = false;
      }
    });

    // Google button - disabled until billing is set
    document.getElementById('googleBtn').addEventListener('click', () => {
      alert("Google login needs billing setup. Use email/password for now.");
    });
  </script>
</body>
</html>
