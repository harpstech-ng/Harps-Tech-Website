<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harps Tech - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
    :root { --primary: #0A192F; --accent: #D4AF37; --white: #FFFFFF; --gray: #8892B0; }
    body { background: var(--primary); color: var(--white); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .container { background: rgba(255,255,255,0.03); padding: 50px 40px; border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2); width: 100%; max-width: 420px; backdrop-filter: blur(15px); }
    .logo { text-align: center; font-size: 2rem; font-weight: 700; color: var(--accent); margin-bottom: 10px; letter-spacing: 2px; }
    .subtitle { text-align: center; color: var(--gray); font-size: 0.9rem; margin-bottom: 40px; }
    h2 { color: var(--white); margin-bottom: 30px; text-align: center; font-size: 1.8rem; font-weight: 600; }
    input { width: 100%; padding: 14px 16px; margin: 12px 0; background: rgba(255,255,255,0.05); border: 1px solid rgba(136, 146, 176, 0.3); border-radius: 10px; color: var(--white); font-size: 0.95rem; outline: none; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1); }
    .btn-primary { width: 100%; padding: 15px; background: var(--accent); color: var(--primary); border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 20px; font-size: 1rem; transition: 0.3s; }
    .btn-primary:hover { transform: translateY(-2px); }
    .divider { display: flex; align-items: center; margin: 30px 0; color: var(--gray); font-size: 0.85rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(136, 146, 176, 0.3); }
    .divider span { padding: 0 15px; }
    .social-login { display: flex; gap: 12px; flex-direction: column; }
    .btn-social { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(136, 146, 176, 0.3); border-radius: 10px; color: var(--white); cursor: pointer; transition: 0.3s; font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-social:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
    .btn-social svg { width: 20px; height: 20px; }
    .toggle { text-align: center; margin-top: 25px; color: var(--gray); cursor: pointer; font-size: 0.9rem; }
    .toggle span { color: var(--accent); font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">HARPS TECH</div>
    <p class="subtitle">The Future of Reliable Technology</p>
    
    <h2 id="formTitle">Create Account</h2>
    
    <input type="text" id="name" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    
    <button class="btn-primary" id="mainBtn" onclick="handleAuth()">Create Account</button>
    
    <div class="divider"><span>or continue with</span></div>
    
    <div class="social-login">
      <button class="btn-social" onclick="signInWithGoogle()">
        <svg viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5h-1.9V20H24v8h11.3c-1.6 4.3-5.7 7.5-11.3 7.5-6.6 0-12-5.4-12-12s5.4-12 12-12c2.7 0 5.2.9 7.2 2.4l6-6C34.5 5.1 29.5 3 24 3 12.4 3 3 12.4 3 24s9.4 21 21 21 21-9.4 21-21c0-1.4-.1-2.7-.4-3.5z"/></svg>
        Continue with Google
      </button>
    </div>
    
    <p class="toggle" onclick="toggleForm()">
      <span id="toggleText">Already have an account? Login</span>
    </p>
  </div>

  <script>
    const SUPABASE_URL = 'https://juzntlfeyyvfiojgpeqk.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_SYxulS_L6d27i8ILu5KNKA_Ueikd6Fj';
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const ADMIN_EMAIL = 'okugbepraise@gmail.com';
    let isLogin = false;

    function toggleForm() {
      isLogin = !isLogin;
      document.getElementById('formTitle').textContent = isLogin ? 'Welcome Back' : 'Create Account';
      document.getElementById('name').style.display = isLogin ? 'none' : 'block';
      document.getElementById('mainBtn').textContent = isLogin ? 'Login' : 'Create Account';
      document.getElementById('toggleText').innerHTML = isLogin 
        ? "Don't have an account? <span>Create Account</span>" 
        : "Already have an account? <span>Login</span>";
    }

    async function handleAuth() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        if (isLogin) {
          const { error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
          window.location.href = email === ADMIN_EMAIL ? 'admin.html' : 'dashboard.html';
        } else {
          if (!name) throw new Error('Please enter your full name');
          const { error } = await supabase.auth.signUp({ 
            email: email, 
            password: password,
            options: { 
              data: { 
                full_name: name 
              }
            }
          });
          if (error) throw error;
          alert('Account created! Check your email for verification link.');
        }
      } catch (error) {
        alert(error.message);
      }
    }

    async function signInWithGoogle() {
      const { error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/dashboard.html' }
      });
      if (error) alert(error.message);
    }

    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        window.location.href = session.user.email === ADMIN_EMAIL ? 'admin.html' : 'dashboard.html';
      }
    });
  </script>
</body>
</html>
