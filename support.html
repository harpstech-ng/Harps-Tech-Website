<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support - Harps Tech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#050505] text-white font-['Outfit']">
  <nav class="fixed w-full z-50 bg-black/80 backdrop-blur-xl border-b border-white/5 py-4">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
      <a href="dashboard.html" class="flex items-center gap-2">
        <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center font-bold text-black">H</div>
        <span class="text-2xl font-extrabold tracking-tighter uppercase">HARPS <span class="text-cyan-400">TECH</span></span>
      </a>
    </div>
  </nav>

  <section class="pt-32 pb-24 px-6">
    <div class="max-w-5xl mx-auto">
      <h1 class="text-5xl font-bold mb-12 text-center">Support Center</h1>
      
      <div class="grid md:grid-cols-2 gap-12">
        <!-- WhatsApp Button -->
        <div class="bg-white/5 border-white/10 rounded-2xl p-8 text-center">
          <i data-lucide="message-circle" class="w-16 h-16 text-green-500 mx-auto mb-4"></i>
          <h3 class="text-2xl font-bold mb-3">Chat on WhatsApp</h3>
          <p class="text-gray-400 mb-6">Fastest response time. Usually under 2 hours.</p>
          <a href="https://wa.me/2348141612736" target="_blank" 
             class="inline-block bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-8 rounded-xl transition">
            Open WhatsApp
          </a>
        </div>

        <!-- Email -->
        <div class="bg-white/5 border-white/10 rounded-2xl p-8 text-center">
          <i data-lucide="mail" class="w-16 h-16 text-cyan-400 mx-auto mb-4"></i>
          <h3 class="text-2xl font-bold mb-3">Email Support</h3>
          <p class="text-gray-400 mb-6">Send detailed inquiries and attachments.</p>
          <a href="mailto:okugbepraise@gmail.com" 
             class="inline-block bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-4 px-8 rounded-xl transition">
            Send Email
          </a>
        </div>
      </div>

      <!-- Inbox Form -->
      <div class="mt-16 bg-white/5 border-white/10 rounded-2xl p-8">
        <h3 class="text-2xl font-bold mb-6">Send a Message</h3>
        <form id="inboxForm" class="space-y-4">
          <input type="text" id="subject" placeholder="Subject" required 
                 class="w-full bg-black/50 border-white/10 p-4 rounded-xl focus:border-cyan-500 outline-none">
          <textarea id="message" rows="5" placeholder="Your message..." required
                    class="w-full bg-black/50 border-white/10 p-4 rounded-xl focus:border-cyan-500 outline-none"></textarea>
          <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-4 rounded-xl">
            Send Message
          </button>
        </form>
        <div id="inboxMsg" class="hidden mt-4 p-3 rounded-lg"></div>
      </div>
    </div>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const app = initializeApp({/* your config */});
    const auth = getAuth(app);
    const db = getFirestore(app);

    lucide.createIcons();

    document.getElementById('inboxForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const user = auth.currentUser;
      if (!user) return alert('Login first');

      await addDoc(collection(db, "inbox"), {
        uid: user.uid,
        email: user.email,
        subject: document.getElementById('subject').value,
        message: document.getElementById('message').value,
        status: 'unread',
        createdAt: new Date()
      });

      document.getElementById('inboxMsg').textContent = 'Message sent! I will reply soon.';
      document.getElementById('inboxMsg').className = 'mt-4 p-3 rounded-lg bg-green-900/30 text-green-400';
      e.target.reset();
    });
  </script>
</body>
</html>
